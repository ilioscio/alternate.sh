<!DOCTYPE html>
<html lang="en" class="theme-phosphor-green">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>alternate.sh</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css">
<script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
<style>
/* ── Reset & base ─────────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  font-family: 'Share Tech Mono', 'Fira Code', 'Courier New', monospace;
  font-size: 14px;
  background: var(--bg);
  color: var(--fg);
  transition: background 0.2s, color 0.2s;
  overflow: hidden;
}

/* ── Themes ───────────────────────────────────────────────────────────────── */
.theme-phosphor-green {
  --bg:           #050a05;
  --fg:           #33ff33;
  --fg-dim:       #1a7a1a;
  --fg-bright:    #99ff99;
  --border:       rgba(51, 255, 51, 0.35);
  --border-dim:   rgba(51, 255, 51, 0.12);
  --input-bg:     rgba(51, 255, 51, 0.05);
  --glow-box:     0 0 6px rgba(51, 255, 51, 0.5), 0 0 24px rgba(51, 255, 51, 0.2);
  --glow-text:    0 0 8px rgba(51, 255, 51, 0.6);
  --scanline-a:   0.07;
  --cursor-color: #33ff33;
}
.theme-phosphor-amber {
  --bg:           #0d0800;
  --fg:           #ffb800;
  --fg-dim:       #8c6500;
  --fg-bright:    #ffd966;
  --border:       rgba(255, 184, 0, 0.35);
  --border-dim:   rgba(255, 184, 0, 0.12);
  --input-bg:     rgba(255, 184, 0, 0.05);
  --glow-box:     0 0 6px rgba(255, 184, 0, 0.5), 0 0 24px rgba(255, 184, 0, 0.2);
  --glow-text:    0 0 8px rgba(255, 184, 0, 0.6);
  --scanline-a:   0.07;
  --cursor-color: #ffb800;
}
.theme-white-paper {
  --bg:           #f0ebe0;
  --fg:           #1a1a1a;
  --fg-dim:       #888880;
  --fg-bright:    #000000;
  --border:       rgba(0, 0, 0, 0.25);
  --border-dim:   rgba(0, 0, 0, 0.10);
  --input-bg:     rgba(0, 0, 0, 0.04);
  --glow-box:     none;
  --glow-text:    none;
  --scanline-a:   0;
  --cursor-color: #1a1a1a;
}
.theme-blue-steel {
  --bg:           #000814;
  --fg:           #4488ff;
  --fg-dim:       #1a3a8c;
  --fg-bright:    #88aaff;
  --border:       rgba(68, 136, 255, 0.35);
  --border-dim:   rgba(68, 136, 255, 0.12);
  --input-bg:     rgba(68, 136, 255, 0.05);
  --glow-box:     0 0 6px rgba(68, 136, 255, 0.5), 0 0 24px rgba(68, 136, 255, 0.2);
  --glow-text:    0 0 8px rgba(68, 136, 255, 0.6);
  --scanline-a:   0.06;
  --cursor-color: #4488ff;
}
.theme-white-black {
  --bg:           #000000;
  --fg:           #ffffff;
  --fg-dim:       #999999;
  --fg-bright:    #ffffff;
  --border:       rgba(255, 255, 255, 0.3);
  --border-dim:   rgba(255, 255, 255, 0.12);
  --input-bg:     rgba(255, 255, 255, 0.05);
  --glow-box:     none;
  --glow-text:    none;
  --scanline-a:   0.10;
  --cursor-color: #ffffff;
}

/* ── Login screen ─────────────────────────────────────────────────────────── */
#login-screen {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
  padding: 1rem;
}

#login-dialog {
  width: 100%;
  max-width: 420px;
  border: 1px solid var(--border);
  box-shadow: var(--glow-box);
  background: var(--bg);
}

.dlg-header {
  padding: 1rem 1.5rem 0.75rem;
  border-bottom: 1px solid var(--border-dim);
  text-align: center;
}
.dlg-header .brand {
  font-size: 1.25rem;
  letter-spacing: 0.15em;
  text-shadow: var(--glow-text);
}
.dlg-header .subtitle {
  font-size: 0.75rem;
  color: var(--fg-dim);
  margin-top: 0.25rem;
  letter-spacing: 0.05em;
}

.dlg-body {
  padding: 1.25rem 1.5rem;
}

.field {
  display: flex;
  align-items: center;
  margin-bottom: 0.75rem;
}
.field label {
  width: 6rem;
  flex-shrink: 0;
  color: var(--fg-dim);
  font-size: 0.8rem;
}
.field input[type=text],
.field input[type=password] {
  flex: 1;
  background: var(--input-bg);
  border: none;
  border-bottom: 1px solid var(--border);
  color: var(--fg);
  font-family: inherit;
  font-size: 0.875rem;
  padding: 0.25rem 0.4rem;
  outline: none;
  caret-color: var(--fg);
}
.field input:focus {
  border-bottom-color: var(--fg);
  box-shadow: 0 1px 0 var(--fg);
}

#login-error, #signup-error, #confirm-error {
  font-size: 0.75rem;
  color: var(--fg-dim);
  min-height: 1.2em;
  margin-bottom: 0.5rem;
  padding-left: 6rem;
}
#login-error:not(:empty)::before,
#signup-error:not(:empty)::before,
#confirm-error:not(:empty)::before {
  content: '! ';
}
#signup-error.ok, #confirm-error.ok { color: var(--fg); }
#signup-error.ok::before, #confirm-error.ok::before { content: ''; }

.dlg-alt {
  text-align: center;
  font-size: 0.75rem;
  color: var(--fg-dim);
  margin-top: 0.6rem;
}
.dlg-note {
  font-size: 0.75rem;
  color: var(--fg-dim);
  padding: 0 1.5rem 0.5rem;
  line-height: 1.4;
}
.linklike {
  background: none;
  border: none;
  color: var(--fg);
  font-family: inherit;
  font-size: inherit;
  cursor: pointer;
  letter-spacing: 0.05em;
  padding: 0;
}
.linklike:hover { text-shadow: var(--glow-text); }

.dlg-submit {
  text-align: center;
  margin-top: 0.5rem;
}
.dlg-submit button {
  background: none;
  border: 1px solid var(--border);
  color: var(--fg);
  font-family: inherit;
  font-size: 0.875rem;
  padding: 0.35rem 2rem;
  cursor: pointer;
  letter-spacing: 0.1em;
  transition: box-shadow 0.15s, border-color 0.15s;
}
.dlg-submit button:hover {
  border-color: var(--fg);
  box-shadow: var(--glow-box);
}
.dlg-submit button:active { opacity: 0.7; }
.dlg-submit button:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}

.dlg-divider {
  border: none;
  border-top: 1px solid var(--border-dim);
  margin: 0;
}

.dlg-prefs {
  padding: 0.75rem 1.5rem;
  display: flex;
  flex-wrap: wrap;
  gap: 0.5rem 1.25rem;
  align-items: center;
}

.pref-label {
  font-size: 0.7rem;
  color: var(--fg-dim);
  letter-spacing: 0.05em;
}

.theme-radios {
  display: flex;
  gap: 0.75rem;
  flex-wrap: wrap;
}
.theme-radios label {
  font-size: 0.75rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 0.25rem;
  color: var(--fg-dim);
}
.theme-radios label:has(input:checked) {
  color: var(--fg);
}
.theme-radios input[type=radio] {
  accent-color: var(--fg);
}

.crt-check label {
  font-size: 0.75rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 0.25rem;
  color: var(--fg-dim);
}
.crt-check input[type=checkbox] {
  accent-color: var(--fg);
}

/* ── Terminal screen ──────────────────────────────────────────────────────── */
#terminal-screen {
  display: flex;
  flex-direction: column;
  height: 100vh;
}

#statusbar {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 0.6rem;
  padding: 0.3rem 0.75rem;
  border-bottom: 1px solid var(--border-dim);
  font-size: 0.75rem;
  background: var(--bg);
}

#sb-brand {
  color: var(--fg);
  letter-spacing: 0.1em;
  text-shadow: var(--glow-text);
  margin-right: 0.25rem;
}
.sb-sep { color: var(--fg-dim); }
#sb-user { color: var(--fg-dim); }

#sb-theme {
  background: transparent;
  border: none;
  border-bottom: 1px solid var(--border-dim);
  color: var(--fg-dim);
  font-family: inherit;
  font-size: 0.75rem;
  cursor: pointer;
  outline: none;
  padding: 0 0.1rem;
}
#sb-theme:focus { border-bottom-color: var(--fg); }

#sb-crt-label {
  cursor: pointer;
  color: var(--fg-dim);
  display: flex;
  align-items: center;
  gap: 0.25rem;
}
#sb-crt-label input { accent-color: var(--fg); }

.sb-spacer { flex: 1; }

#sb-disconnect {
  background: none;
  border: 1px solid var(--border-dim);
  color: var(--fg-dim);
  font-family: inherit;
  font-size: 0.7rem;
  cursor: pointer;
  padding: 0.15rem 0.6rem;
  letter-spacing: 0.05em;
}
#sb-disconnect:hover {
  border-color: var(--fg);
  color: var(--fg);
}

#main-row {
  flex: 1;
  display: flex;
  min-height: 0;
}

#terminal-wrapper {
  flex: 1;
  position: relative;
  overflow: hidden;
  background: var(--bg);
  transition: border-radius 0.3s, box-shadow 0.3s;
}

/* ── Call panel ───────────────────────────────────────────────────────────── */
#call-panel {
  width: min(42vw, 420px);
  border-left: 1px solid var(--border-dim);
  background: var(--bg);
  display: flex;
  flex-direction: column;
  gap: 0.6rem;
  padding: 0.75rem;
  overflow-y: auto;
}

.call-head {
  font-size: 0.8rem;
  letter-spacing: 0.1em;
  color: var(--fg);
  text-shadow: var(--glow-text);
}
@keyframes lamp-blink {
  0%, 100% { opacity: 1; }
  50%      { opacity: 0.35; }
}
.call-lamp { animation: lamp-blink 2s infinite; }

#call-remote {
  width: 100%;
  height: auto;
  image-rendering: pixelated;
  border: 1px solid var(--border);
  box-shadow: var(--glow-box);
  background: var(--bg);
}

#call-self {
  width: 38%;
  height: auto;
  align-self: flex-end;
  image-rendering: pixelated;
  border: 1px solid var(--border-dim);
  opacity: 0.9;
}

.call-meta {
  display: flex;
  justify-content: space-between;
  font-size: 0.75rem;
  color: var(--fg-dim);
}

.call-buttons {
  display: flex;
  gap: 1rem;
  flex-wrap: wrap;
  font-size: 0.8rem;
}

.call-hint {
  font-size: 0.7rem;
  color: var(--fg-dim);
  line-height: 1.4;
}

#terminal {
  width: 100%;
  height: 100%;
}
/* xterm canvas needs full height */
#terminal .xterm { height: 100%; }
#terminal .xterm-viewport { overflow-y: hidden !important; }

/* CRT scanline overlay — fixed position puts it above all canvas layers */
.crt-on body::after {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 9999;
  background: repeating-linear-gradient(
    to bottom,
    transparent 0px,
    transparent 3px,
    rgba(0, 0, 0, var(--scanline-a, 0.07)) 3px,
    rgba(0, 0, 0, var(--scanline-a, 0.07)) 4px
  );
}

/* ── CRT mode ─────────────────────────────────────────────────────────────── */
.crt-on #terminal-wrapper {
  border-radius: 10px 10px 0 0;
  box-shadow: var(--glow-box), inset 0 0 60px rgba(0,0,0,0.35);
}
@keyframes crt-flicker {
  0%   { opacity: 1; }
  48%  { opacity: 0.985; }
  50%  { opacity: 0.99; }
  52%  { opacity: 0.985; }
  100% { opacity: 1; }
}
.crt-on #terminal-wrapper {
  animation: crt-flicker 8s infinite;
}

/* ── Utility ─────────────────────────────────────────────────────────────── */
[hidden] { display: none !important; }
</style>
</head>
<body>

<!-- ── Login screen ──────────────────────────────────────────────────────── -->
<div id="login-screen">
  <div id="login-dialog">
    <div class="dlg-header">
      <div class="brand">alternate.sh</div>
      <div class="subtitle">an alternate history of the net</div>
    </div>
    <form class="dlg-body" id="login-form" autocomplete="on">
      <div class="field">
        <label for="inp-user">login:</label>
        <input type="text" id="inp-user" name="username" autocomplete="username" spellcheck="false" autofocus>
      </div>
      <div class="field">
        <label for="inp-pass">password:</label>
        <input type="password" id="inp-pass" name="password" autocomplete="current-password">
      </div>
      <div id="login-error" aria-live="polite"></div>
      <div class="dlg-submit">
        <button type="submit" id="login-btn">[ connect ]</button>
      </div>
      <div class="dlg-alt">
        no account? <button type="button" class="linklike" id="show-signup">[ register ]</button>
      </div>
    </form>

    <!-- Signup form (hidden until 'register') -->
    <form class="dlg-body" id="signup-form" autocomplete="on" hidden>
      <div class="field">
        <label for="inp-su-user">login:</label>
        <input type="text" id="inp-su-user" name="username" autocomplete="username" spellcheck="false" maxlength="32">
      </div>
      <div class="field">
        <label for="inp-su-email">email:</label>
        <input type="email" id="inp-su-email" name="email" autocomplete="email" spellcheck="false" maxlength="254">
      </div>
      <div class="field">
        <label for="inp-su-pass">password:</label>
        <input type="password" id="inp-su-pass" name="password" autocomplete="new-password" minlength="8" maxlength="128">
      </div>
      <div id="signup-error" aria-live="polite"></div>
      <div class="dlg-submit">
        <button type="submit" id="signup-btn">[ create account ]</button>
      </div>
      <div class="dlg-alt">
        <button type="button" class="linklike" id="signup-back">[ back to login ]</button>
      </div>
    </form>

    <!-- Code confirmation (hidden until a signup is submitted) -->
    <form class="dlg-body" id="confirm-form" autocomplete="off" hidden>
      <p class="dlg-note">Check your email for a 6-digit confirmation code.</p>
      <div class="field">
        <label for="inp-cf-code">code:</label>
        <input type="text" id="inp-cf-code" name="code" inputmode="numeric" spellcheck="false" maxlength="6" autocomplete="one-time-code">
      </div>
      <div id="confirm-error" aria-live="polite"></div>
      <div class="dlg-submit">
        <button type="submit" id="confirm-btn">[ confirm ]</button>
      </div>
      <div class="dlg-alt">
        <button type="button" class="linklike" id="confirm-back">[ back to login ]</button>
      </div>
    </form>

    <hr class="dlg-divider">
    <div class="dlg-prefs">
      <span class="pref-label">theme:</span>
      <div class="theme-radios" id="login-theme-radios">
        <label><input type="radio" name="theme" value="phosphor-green"> green</label>
        <label><input type="radio" name="theme" value="phosphor-amber"> amber</label>
        <label><input type="radio" name="theme" value="white-paper"> paper</label>
        <label><input type="radio" name="theme" value="blue-steel"> blue</label>
        <label><input type="radio" name="theme" value="white-black"> mono</label>
      </div>
      <div class="crt-check">
        <label><input type="checkbox" id="login-crt"> CRT effects</label>
      </div>
    </div>
  </div>
</div>

<!-- ── Terminal screen ───────────────────────────────────────────────────── -->
<div id="terminal-screen" hidden>
  <div id="statusbar">
    <span id="sb-brand">alternate.sh</span>
    <span class="sb-sep">·</span>
    <span id="sb-user"></span>
    <span class="sb-spacer"></span>
    <select id="sb-theme" aria-label="Theme">
      <option value="phosphor-green">green</option>
      <option value="phosphor-amber">amber</option>
      <option value="white-paper">paper</option>
      <option value="blue-steel">blue</option>
      <option value="white-black">mono</option>
    </select>
    <label id="sb-crt-label" title="CRT effects">
      <input type="checkbox" id="sb-crt"> crt
    </label>
    <button id="sb-disconnect">[ disconnect ]</button>
  </div>
  <div id="main-row">
    <div id="terminal-wrapper">
      <div id="terminal"></div>
    </div>

    <!-- ── Call panel (§9: retro-futurism A/V) ─────────────────────────── -->
    <aside id="call-panel" hidden>
      <div class="call-head">
        <span class="call-lamp">●</span> CALL — <span id="call-peer"></span>
      </div>
      <canvas id="call-remote" class="call-video-only" width="128" height="96"></canvas>
      <div class="call-meta">
        <span id="call-status">connected</span>
        <span id="call-duration">00:00</span>
      </div>
      <canvas id="call-self" class="call-video-only" width="128" height="96"></canvas>
      <div class="call-buttons">
        <button id="call-mute" class="linklike">[ mute ]</button>
        <button id="call-style" class="linklike call-video-only">[ style: grain ]</button>
        <button id="call-hangup" class="linklike">[ hang up ]</button>
      </div>
      <div class="call-hint">the terminal stays in charge — Ctrl+C there hangs up too</div>
    </aside>
  </div>
</div>

<script type="module" src="/js/app.js"></script>
<script type="module" src="/js/call.js"></script>
</body>
</html>
