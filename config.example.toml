[server]
hostname = "mynode.example.com"
motd     = "Welcome to alternate.sh\nBe excellent to each other."

[ssh]
port     = 2222
host_key = "/etc/alternate-sh/ssh_host_ed25519_key"

[web]
port     = 8080
tls_cert = ""
tls_key  = ""

[database]
dsn = "postgres://alternateuser:pass@localhost/alternatedb?sslmode=disable"

[federation]
assp_port = 4119
enabled   = false

# Live A/V calls (web client only; see DESIGN.md §9). width/height/fps are
# this node's video ceiling: cross-node negotiation clamps a caller's
# proposal to these values, never above them.
[calls]
enabled = true
width   = 128   # pixels; must be a multiple of 8
height  = 96
fps     = 24

[limits]
max_users    = 500
mail_per_hour = 50
news_per_day  = 20
